<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb347"/>
      <stop offset="1" stop-color="#ff7a18"/>
    </linearGradient>
    <radialGradient id="bg" cx="0.5" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#26222b"/>
      <stop offset="1" stop-color="#131117"/>
    </radialGradient>
  </defs>

  <!-- brand tile -->
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>

  <!-- bottom bun -->
  <path d="M11 41 h42 v2 a6 6 0 0 1 -6 6 H17 a6 6 0 0 1 -6 -6 z" fill="url(#bun)"/>

  <!-- patty -->
  <rect x="10.5" y="34" width="43" height="6.6" rx="3.3" fill="#3c2214"/>

  <!-- lettuce (scalloped ruffle) -->
  <path d="M10 31 H54 V33 a3 3 0 0 1 -6 0 a3 3 0 0 1 -6 0 a3 3 0 0 1 -6 0 a3 3 0 0 1 -6 0 a3 3 0 0 1 -6 0 a3 3 0 0 1 -6 0 a3 3 0 0 1 -6 0 L10 33 Z" fill="#74b83a"/>

  <!-- top bun -->
  <path d="M12 33 C12 17 52 17 52 33 Z" fill="url(#bun)"/>

  <!-- sesame seeds -->
  <g fill="#ffe9c7">
    <ellipse cx="25" cy="27" rx="2" ry="1.1" transform="rotate(-22 25 27)"/>
    <ellipse cx="33" cy="24.5" rx="2" ry="1.1" transform="rotate(8 33 24.5)"/>
    <ellipse cx="41" cy="27" rx="2" ry="1.1" transform="rotate(22 41 27)"/>
    <ellipse cx="30" cy="30" rx="2" ry="1.1" transform="rotate(-8 30 30)"/>
    <ellipse cx="37" cy="30" rx="2" ry="1.1" transform="rotate(12 37 30)"/>
  </g>
</svg>
